      <stop stop-color="#FFF7EA"/>
      <stop offset="0.48" stop-color="#F8F3EE"/>
      <stop offset="1" stop-color="#EAF1F7"/>
    </linearGradient>
    <linearGradient id="room" x1="544" y1="203" x2="1067" y2="652" gradientUnits="userSpaceOnUse">
